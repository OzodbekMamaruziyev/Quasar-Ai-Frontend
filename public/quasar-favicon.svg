<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="32" height="32" rx="8" fill="#050810"/>

  <!-- Orbit ring -->
  <ellipse cx="16" cy="16" rx="10" ry="4"
    fill="none" stroke="url(#g1)" stroke-width="1"
    stroke-dasharray="3 1.5" opacity="0.6"
    transform="rotate(-35 16 16)" filter="url(#fg)"/>

  <!-- Main ring -->
  <circle cx="16" cy="16" r="7"
    fill="none" stroke="url(#g1)" stroke-width="1.6"
    filter="url(#fg)"/>

  <!-- Top jet -->
  <line x1="16" y1="9" x2="16" y2="2"
    stroke="url(#g1)" stroke-width="1.4"
    stroke-linecap="round" filter="url(#fg)"/>
  <!-- Bottom jet -->
  <line x1="16" y1="23" x2="16" y2="30"
    stroke="url(#g1)" stroke-width="1.4"
    stroke-linecap="round" filter="url(#fg)"/>

  <!-- Jet tips -->
  <circle cx="16" cy="2"  r="1.2" fill="#93c5fd" opacity="0.9" filter="url(#fg)"/>
  <circle cx="16" cy="30" r="1.2" fill="#93c5fd" opacity="0.9" filter="url(#fg)"/>

  <!-- Orbiting dot -->
  <circle cx="26" cy="13" r="1.5" fill="#818cf8" filter="url(#fg)"/>

  <!-- Core -->
  <circle cx="16" cy="16" r="4" fill="url(#gc)" filter="url(#fg)"/>
  <circle cx="16" cy="16" r="1.8" fill="#ffffff"/>
</svg>
