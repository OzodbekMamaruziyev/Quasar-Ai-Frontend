<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="gRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="gCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#93c5fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gBg" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1629" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="1"/>
    </radialGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fCoreGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fTextGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0f2ff"/>
      <stop offset="55%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gTag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <!-- Dark background with subtle gradient -->
  <rect width="400" height="120" rx="16" fill="url(#gBg)"/>

  <!-- Background glow blob -->
  <ellipse cx="60" cy="60" rx="55" ry="40" fill="#3b82f6" opacity="0.04"/>
  <ellipse cx="60" cy="60" rx="30" ry="22" fill="#6366f1" opacity="0.06"/>

  <!-- Subtle star dots bg -->
  <circle cx="130" cy="15"  r="0.8" fill="#60a5fa" opacity="0.3"/>
  <circle cx="200" cy="25"  r="0.6" fill="#818cf8" opacity="0.25"/>
  <circle cx="310" cy="18"  r="0.7" fill="#93c5fd" opacity="0.2"/>
  <circle cx="370" cy="80"  r="0.9" fill="#6366f1" opacity="0.25"/>
  <circle cx="150" cy="100" r="0.6" fill="#60a5fa" opacity="0.2"/>
  <circle cx="340" cy="95"  r="0.7" fill="#818cf8" opacity="0.2"/>

  <!-- ═══ ICON (center: 58, 60) ═══ -->

  <!-- Outer orbit ring -->
  <ellipse cx="58" cy="60" rx="30" ry="11"
    fill="none" stroke="url(#gRing)" stroke-width="1.4"
    stroke-dasharray="5 2.5" opacity="0.55"
    transform="rotate(-30 58 60)" filter="url(#fGlow)"/>

  <!-- Second orbit ring -->
  <ellipse cx="58" cy="60" rx="23" ry="7.5"
    fill="none" stroke="#6366f1" stroke-width="1"
    stroke-dasharray="3 3" opacity="0.3"
    transform="rotate(50 58 60)"/>

  <!-- Main circle -->
  <circle cx="58" cy="60" r="18"
    fill="none" stroke="url(#gMain)" stroke-width="2.2"
    filter="url(#fGlow)"/>

  <!-- Inner circle -->
  <circle cx="58" cy="60" r="11"
    fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.5"/>

  <!-- Top jet -->
  <line x1="58" y1="42" x2="58" y2="12"
    stroke="url(#gMain)" stroke-width="2"
    stroke-linecap="round" filter="url(#fGlow)" opacity="0.9"/>
  <!-- Top jet glow -->
  <line x1="58" y1="42" x2="58" y2="12"
    stroke="#60a5fa" stroke-width="5"
    stroke-linecap="round" opacity="0.12"/>

  <!-- Bottom jet -->
  <line x1="58" y1="78" x2="58" y2="108"
    stroke="url(#gMain)" stroke-width="2"
    stroke-linecap="round" filter="url(#fGlow)" opacity="0.9"/>
  <!-- Bottom jet glow -->
  <line x1="58" y1="78" x2="58" y2="108"
    stroke="#60a5fa" stroke-width="5"
    stroke-linecap="round" opacity="0.12"/>

  <!-- Jet tip flares -->
  <circle cx="58" cy="10"  r="2.8" fill="#93c5fd" opacity="0.8" filter="url(#fCoreGlow)"/>
  <circle cx="58" cy="110" r="2.8" fill="#93c5fd" opacity="0.8" filter="url(#fCoreGlow)"/>

  <!-- Orbiting dots -->
  <circle cx="83" cy="52" r="2.8" fill="#818cf8" filter="url(#fCoreGlow)" opacity="0.9"/>
  <circle cx="33" cy="68" r="2"   fill="#60a5fa" filter="url(#fCoreGlow)" opacity="0.7"/>

  <!-- Core glow -->
  <circle cx="58" cy="60" r="9" fill="url(#gCore)" filter="url(#fCoreGlow)"/>
  <!-- Core bright center -->
  <circle cx="58" cy="60" r="3.5" fill="#ffffff" opacity="1" filter="url(#fCoreGlow)"/>

  <!-- Accent stars -->
  <circle cx="40" cy="32" r="1.1" fill="#93c5fd" opacity="0.55"/>
  <circle cx="76" cy="85" r="0.9" fill="#818cf8" opacity="0.45"/>
  <circle cx="80" cy="36" r="0.8" fill="#60a5fa" opacity="0.4"/>
  <circle cx="36" cy="85" r="1"   fill="#6366f1" opacity="0.45"/>

  <!-- ═══ SEPARATOR ═══ -->
  <line x1="100" y1="28" x2="100" y2="92"
    stroke="url(#gMain)" stroke-width="1" opacity="0.2"/>

  <!-- ═══ TEXT ═══ -->
  <!-- Main wordmark -->
  <text x="118" y="67"
    font-family="'Orbitron', 'Exo 2', monospace"
    font-size="32" font-weight="700"
    letter-spacing="4"
    fill="url(#gText)"
    filter="url(#fTextGlow)">QUASAR</text>

  <!-- Tagline -->
  <text x="120" y="84"
    font-family="'DM Sans', sans-serif"
    font-size="10" font-weight="400"
    letter-spacing="5"
    fill="url(#gTag)">AI  BUILDER</text>
</svg>
